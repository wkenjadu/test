<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script>
const client = new Appwrite.Client()
  .setEndpoint('https://sgp.cloud.appwrite.io/v1')
  .setProject('69b9d85a002298560df7');

const account = new Appwrite.Account(client);

const input = document.getElementById('input');
const output = document.getElementById('output');
const mainContainer = document.getElementById('mainContainer');
const userStatus = document.getElementById('userStatus');

// 회원가입
async function signUp() {
  const id = document.getElementById("id").value.trim();
  const password = document.getElementById("password").value;

  if (!id || !password) {
    alert("아이디/비번 입력");
    return;
  }

  try {
    await account.create(
      Appwrite.ID.unique(),
      id + "@app.com",
      password,
      id
    );
    alert("회원가입 성공!");
    checkUser();
  } catch (err) {
    console.error("회원가입 오류:", err);
    alert("회원가입 오류: " + (err?.message || JSON.stringify(err)));
  }
}

// 로그인
async function login() {
  const id = document.getElementById("id").value.trim();
  const password = document.getElementById("password").value;

  if (!id || !password) {
    alert("아이디/비번 입력");
    return;
  }

  try {
    await account.createEmailSession(
      id + "@app.com",
      password
    );
    alert("로그인 성공!");
    checkUser();
  } catch (err) {
    console.error("로그인 오류:", err);
    alert("로그인 오류: " + (err?.message || JSON.stringify(err)));
  }
}

// 로그아웃
async function logout() {
  try {
    await account.deleteSession('current');
  } catch (err) {
    console.error("로그아웃 오류:", err);
    alert("로그아웃 오류: " + (err?.message || JSON.stringify(err)));
  }
  checkUser();
}

// 로그인 상태 확인
async function checkUser() {
  try {
    const user = await account.get();
    userStatus.textContent = "로그인됨: " + user.name;
    mainContainer.style.display = "block";
  } catch (err) {
    userStatus.textContent = "로그아웃 상태";
    mainContainer.style.display = "none";
  }
}

// 쉼표 기능
function formatNicknames(text) {
  return text.replace(/,/g, ' ')
    .replace(/[()0-9-]/g, '')
    .trim()
    .split(/\s+/)
    .filter(v => v.length > 0)
    .join(', ');
}

input.addEventListener('input', () => {
  output.value = formatNicknames(input.value);
});

// 복사
document.getElementById('copyBtn').addEventListener('click', async () => {
  if (!output.value) return;

  try {
    await navigator.clipboard.writeText(output.value);
    alert("복사됨!");
  } catch (e) {
    output.select();
    document.execCommand('copy');
    alert("복사됨!");
  }
});

// 시작
checkUser();
</script>
