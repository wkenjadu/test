<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>쉼표 자동 생성</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: system-ui; background:#0f172a; color:#e5e7eb; padding:24px; }
    .container { max-width:720px; margin:0 auto; background:#020617; padding:24px; border-radius:16px; }
    textarea { width:100%; min-height:160px; padding:12px; border-radius:12px; background:#020617; color:#e5e7eb; border:1px solid #334155; }
    button { padding:10px 16px; border:none; border-radius:10px; background:#38bdf8; color:#020617; font-weight:bold; cursor:pointer; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div style="max-width:720px;margin:0 auto 20px;">
  <input id="id" placeholder="아이디" style="padding:8px;border-radius:8px;">
  <input id="password" type="password" placeholder="비밀번호" style="padding:8px;border-radius:8px;">
  <button onclick="signUp()">회원가입</button>
  <button onclick="login()">로그인</button>
  <button onclick="logout()">로그아웃</button>
  <span id="userStatus"></span>
</div>

<!-- 메인 -->
<div class="container" id="mainContainer" style="display:none;">
  <h1>쉼표 자동 생성</h1>
  <textarea id="input" placeholder="닉네임 입력"></textarea>

  <p>결과</p>
  <textarea id="output" readonly></textarea>

  <button id="copyBtn">복사</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script>
const client = new Appwrite.Client()
  .setEndpoint('https://sgp.cloud.appwrite.io/v1')
  .setProject('69b9d85a002298560df7'); // 👈 이거 바꿔

const account = new Appwrite.Account(client);

const input = document.getElementById('input');
const output = document.getElementById('output');
const mainContainer = document.getElementById('mainContainer');
const userStatus = document.getElementById('userStatus');

// 🔥 회원가입 (아이디 중복 자동 체크 포함)
async function signUp() {
  const id = document.getElementById("id").value;
  const password = document.getElementById("password").value;

  if(!id || !password) return alert("아이디/비번 입력");

  try {
    await account.create(
      Appwrite.ID.unique(),
      id + "@app.com",
      password,
      id
    );
    alert("회원가입 성공!");
  } catch (err) {
    if(err.message.includes("already exists")) {
      alert("이미 존재하는 아이디 ❌");
    } else {
      alert(err.message);
    }
  }
}

// 🔥 로그인
async function login() {
  const id = document.getElementById("id").value;
  const password = document.getElementById("password").value;

  try {
    await account.createEmailSession(
      id + "@app.com",
      password
    );
    alert("로그인 성공!");
    checkUser();
  } catch {
    alert("아이디 또는 비밀번호 틀림");
  }
}

// 🔥 로그아웃
async function logout() {
  await account.deleteSession('current');
  checkUser();
}

// 🔥 로그인 상태 확인
async function checkUser() {
  try {
    const user = await account.get();
    userStatus.textContent = "로그인됨: " + user.name;
    mainContainer.style.display = "block";
  } catch {
    userStatus.textContent = "로그아웃 상태";
    mainContainer.style.display = "none";
  }
}

// 쉼표 기능
function formatNicknames(text) {
  return text.replace(/,/g,' ')
    .replace(/[()0-9-]/g,'')
    .trim()
    .split(/\s+/)
    .filter(v=>v.length>0)
    .join(', ');
}

input.addEventListener('input', ()=>{
  output.value = formatNicknames(input.value);
});

// 복사
document.getElementById('copyBtn').addEventListener('click', ()=>{
  navigator.clipboard.writeText(output.value);
  alert("복사됨!");
});

// 시작
checkUser();
</script>

</body>
</html>
